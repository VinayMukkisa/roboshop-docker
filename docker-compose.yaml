services:
  catalogue:
    build:
      context: ./catalogue
      dockerfile: Dockerfile
    image: catalogue:v1
    container_name: catalogue
    depends_on:
      - mongodb
  mongodb:
    build:
      context: ./mongodb
      dockerfile: Dockerfile
    image: mongodb:v1
    container_name: mongodb
    volumes:
    - mongodb:/data/db
  redis:
    image: redis:7.0
    container_name: redis
    volumes:
    - redis:/data
  user:
    build:
      context: ./user
      dockerfile: Dockerfile
    image: user:v1
    container_name: user
    depends_on:
      - mongodb
      - redis
  cart:
    build:
      context: ./cart
      dockerfile: Dockerfile
    image: cart:v1
    container_name: cart
    depends_on:
      - catalogue
      - redis
  mysql:
    build:
      context: ./mysql
      dockerfile: Dockerfile
    image: mysql:v1
    container_name: mysql
    volumes:
    - mysql:/var/lib/mysql
  shipping:
    build:
      context: ./shipping
      dockerfile: Dockerfile
    image: shipping:v1
    container_name: shipping
    depends_on:
      - mysql
      - cart
  rabbitmq:
    image: rabbitmq:3
    container_name: rabbitmq
    volumes: # -v rabbitmq:/var/lib/rabbitmq
    - rabbitmq:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
   
  payment:
    build:
      context: ./payment
      dockerfile: Dockerfile
    image: payment:v1
    container_name: payment
    depends_on:
    - rabbitmq
    - cart
    - user
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: frontend:v1
    container_name: frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue
    - user
    - cart
    - shipping
    - payment  
networks:
  default:
    external: false # true if you have created network manually using docker network command
    name: roboshop
    driver: bridge
volumes:
  mongodb: # docker volume create mongodb. /var/lib/docker/volumes
  redis:
  mysql:
  rabbitmq: